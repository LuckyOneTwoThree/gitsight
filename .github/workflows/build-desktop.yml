name: Build & Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_ignore_scripts: "true"

      - name: Install better-sqlite3 prebuild for Electron
        run: cd node_modules/better-sqlite3 && npx prebuild-install --runtime=electron --target=41.3.0
        env:
          npm_config_runtime: electron
          npm_config_target: 41.3.0

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build desktop package
        run: npx electron-builder

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GitSight-${{ matrix.platform }}
          path: |
            dist-electron-output/*.exe
            dist-electron-output/*.dmg
            dist-electron-output/*.AppImage
            dist-electron-output/*.yml
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: GitSight-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
