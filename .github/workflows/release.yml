name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_ignore_scripts: "true"

      - name: Download better-sqlite3 prebuild
        run: npx prebuild-install -d node_modules/better-sqlite3
        continue-on-error: true

      - name: Build Next.js
        run: npm run build

      - name: Compile Electron
        run: npm run build:electron

      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GitSight-${{ matrix.platform }}
          path: |
            dist-electron-output/*.exe
            dist-electron-output/*.dmg
            dist-electron-output/*.AppImage
            dist-electron-output/*.yml
          if-no-files-found: ignore
